<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VK Mini App Token</title>
  <script src="https://vk.com/js/api/bridge/vkbridge.js"></script>
</head>
<body>
  <h1>Получение токена для опросов</h1>
  
  <!-- Кнопка изначально неактивна (это нормально!) -->
  <button id="btn" disabled>Получить токен</button>
  
  <p>Токен появится в консоли (F12) и во всплывающем окне.</p>

  <script>
    // 1. Ждём, пока VK Bridge сам сообщит о готовности
    VKBridge.on('VKWebAppInitResult', () => {
      console.log('✅ VK Bridge успешно инициализирован!');
      
      // 2. Находим кнопку и делаем её активной
      const btn = document.getElementById('btn');
      btn.disabled = false;
      btn.textContent = '✅ Токен готов, нажать для получения';

      // 3. Вешаем обработчик клика
      btn.addEventListener('click', () => {
        console.log('🖱️ Кнопка нажата. Отправляем запрос на токен...');
        
        VKBridge.send('VKWebAppGetAuthToken', {
          group_id: 239900520,
          scope: 'wall,polls,offline'
        });
      });
    });

    // 4. Обработка успешного получения токена (ИСПРАВЛЕНО: VKWebApp, а не VKWebAnn)
    VKBridge.on('VKWebAppGetAuthTokenResult', (e) => {
      const token = e.detail.access_token;
      console.log('🔑 ТОКЕН ДЛЯ N8N:', token);
      alert('Скопируй токен из консоли (F12):\n' + token);
    });

    // 5. Обработка любых ошибок (чтобы ты видел, что пошло не так)
    VKBridge.on('VKWebAppError', (e) => {
      console.error('❌ Ошибка VK Bridge:', e);
      alert('Ошибка: ' + JSON.stringify(e.detail));
    });
  </script>
</body>
</html>
