<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Mini App: Токен для опросов</title>
    
    <!-- Подключаем VK Bridge через CDN -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { color: #0077FF; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        
        .status-box {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            min-width: 250px;
        }
        .status-loading { background-color: #e3f2fd; color: #1976d2; }
        .status-success { background-color: #e8f5e9; color: #2e7d32; }
        .status-error { background-color: #ffebee; color: #c62828; }

        button {
            padding: 16px 32px;
            font-size: 18px;
            background-color: #0077FF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
            font-weight: 600;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        button:not(:disabled):active { transform: scale(0.98); }
        button:not(:disabled):hover { opacity: 0.8; }
    </style>
</head>
<body>

    <h1>Получение токена</h1>
    <p>Мини-приложение для VK</p>

    <div id="status-box" class="status-box status-loading">
        Загрузка системы...
    </div>

    <button id="btn" disabled>
        🔑 Получить токен сообщества
    </button>

    <script>
        const statusBox = document.getElementById('status-box');
        const btn = document.getElementById('btn');

        function updateStatus(text, type) {
            statusBox.textContent = text;
            statusBox.className = 'status-box';
            if (type === 'success') statusBox.classList.add('status-success');
            else if (type === 'error') statusBox.classList.add('status-error');
            else statusBox.classList.add('status-loading');
        }

        // ГЛАВНОЕ ИСПРАВЛЕНИЕ:
        // Мы не запускаем код сразу. Мы ждем, пока VK Bridge реально загрузится.
        // Если VKBridge уже есть (загрузился быстро) - запускаем init().
        // Если нет - ждем события load окна.
        
        function initApp() {
            if (typeof VKBridge === 'undefined') {
                console.error('❌ КРИТИЧЕСКАЯ ОШИБКА: VKBridge все еще не определен!');
                updateStatus('Ошибка: Не удалось загрузить VK Bridge. Проверьте интернет.', 'error');
                return;
            }

            console.log('✅ VK Bridge найден. Инициализация...');
            updateStatus('VK Bridge готов. Ожидание инициализации приложения...', 'loading');

            // Подписка на результат инициализации
            VKBridge.subscribe('VKWebAppInitResult', (e) => {
                if (e.detail.status === 'ok') {
                    console.log('✅ Приложение инициализировано!');
                    updateStatus('Статус: Готово к работе!', 'success');
                    
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = '✅ Готово! Нажми для получения токена';
                    }
                } else {
                    console.error('❌ Ошибка инициализации VK:', e.detail);
                    updateStatus('Ошибка инициализации VK App.', 'error');
                }
            });

            // Отправляем запрос на инициализацию
            VKBridge.send('VKWebAppInit');
        }

        // Логика ожидания:
        // 1. Проверяем сразу (на случай быстрого CDN)
        if (typeof VKBridge !== 'undefined') {
            initApp();
        } else {
            // 2. Если не загрузился сразу, ждем полной загрузки страницы
            window.addEventListener('load', () => {
                console.log('🕒 Страница загружена, проверяем VKBridge...');
                if (typeof VKBridge !== 'undefined') {
                    initApp();
                } else {
                    // 3. Если и после загрузки страницы нет VKBridge - это проблема сети или CDN
                    console.error('❌ VKBridge не появился даже после загрузки страницы.');
                    updateStatus('Ошибка: VK Bridge не загрузился. Возможно, проблема с сетью или CDN.', 'error');
                }
            });
        }

        // Обработка клика
        if (btn) {
            btn.addEventListener('click', () => {
                if (!window.VKBridge) {
                    alert('Библиотека VK Bridge не загружена!');
                    return;
                }
                console.log('🖱️ Запрос токена...');
                updateStatus('Отправка запроса...', 'loading');
                
                VKBridge.send('VKWebAppGetCommunityToken', {
                    group_id: 239900520,
                    scope: 'polls,wall,offline'
                });
            });
        }

        // Обработка ответа от VK
        if (typeof VKBridge !== 'undefined') {
            VKBridge.on('VKWebAppGetCommunityTokenResult', (e) => {
                const token = e.detail.access_token;
                console.log('🔑 ТОКЕН ПОЛУЧЕН:', token);
                alert('Токен получен!\n\nСкопируйте его из консоли (F12 -> Console).\n\n' + token);
                updateStatus('Токен успешно получен!', 'success');
            });

            VKBridge.on('VKWebAppError', (e) => {
                console.error('❌ Ошибка VK:', e.detail);
                const msg = e.detail?.error_description || 'Неизвестная ошибка';
                updateStatus('Ошибка: ' + msg, 'error');
                if (btn) btn.disabled = false;
            });
        }
    </script>
</body>
</html>
