<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Mini App: Токен для опросов</title>
    
    <!-- ИСПРАВЛЕНО: Используем стабильный CDN jsdelivr вместо unpkg -->
    <script src="https://cdn.jsdelivr.net/npm/@vkontakte/vk-bridge@2/dist/browser.min.js" defer></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #0077FF; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #0077FF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        button:not(:disabled):hover { opacity: 0.8; }
        .status { margin-top: 10px; font-size: 14px; color: #666; }
        .success-msg { color: #2e7d32; font-weight: bold; }
        .error-msg { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Получение токена для опросов</h1>
    <p>Приложение инициализируется...</p>
    <p class="status" id="status">Ожидание загрузки VK Bridge...</p>

    <button id="btn" disabled>
        🔑 Получить токен сообщества
    </button>

    <p style="margin-top: 20px; font-size: 12px; color: #999;">
        Проверяй консоль (F12) для диагностики.
    </p>

    <script>
        const updateStatus = (text, className = 'status') => {
            const el = document.getElementById('status');
            if (el) {
                el.textContent = text;
                el.className = className;
            }
        };

        // Проверка после загрузки DOM
        if (typeof VKBridge === 'undefined') {
            console.error('❌ КРИТИЧЕСКАЯ ОШИБКА: VKBridge не определен!');
            console.log('🔍 Что проверить:');
            console.log('1. Открой вкладку Network в консоли. Найди строку vk-bridge...');
            console.log('2. Если там красный статус (404/403) — проблема в CDN (сети).');
            console.log('3. Если файла вообще нет в списке — проверь тег <script> в коде.');
            
            updateStatus('Ошибка: VK Bridge не загрузился. См. консоль (F12).', 'error-msg');
        } else {
            console.log('✅ VK Bridge успешно загружен!');
            updateStatus('VK Bridge загружен. Инициализация...', 'success-msg');

            VKBridge.subscribe('VKWebAppInitResult', () => {
                console.log('✅ VK Bridge успешно инициализирован!');
                updateStatus('Статус: Готово к работе.', 'success-msg');
                
                const btn = document.getElementById('btn');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '✅ Готово! Нажми для получения токена';
                    
                    btn.addEventListener('click', () => {
                        console.log('🖱️ Запрос токена...');
                        VKBridge.send('VKWebAppGetCommunityToken', {
                            group_id: 239900520,
                            scope: 'polls,wall,offline'
                        });
                    });
                }
            });

            VKBridge.send('VKWebAppInit');
        }

        VKBridge.on('VKWebAppGetCommunityTokenResult', (e) => {
            const token = e.detail.access_token;
            console.log('🔑 ТОКЕН ПОЛУЧЕН:', token);
            alert('Токен в консоли (F12):\n\n' + token);
        });

        VKBridge.on('VKWebAppError', (e) => {
            console.error('❌ Ошибка VK:', e.detail);
            updateStatus('Ошибка: ' + (e.detail?.error_description || 'Неизвестная ошибка'), 'error-msg');
        });
    </script>
</body>
</html>
