<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Mini App: Токен для опросов</title>
    
    <!-- ВАЖНО: Используем версию @2 для стабильности -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge@2/dist/browser.min.js" defer></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #0077FF; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #0077FF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        button:not(:disabled):hover { opacity: 0.8; }
        .status { margin-top: 10px; font-size: 14px; color: #666; }
        .success-msg { color: #2e7d32; font-weight: bold; }
        .error-msg { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Получение токена для опросов</h1>
    <p>Приложение инициализируется...</p>
    <p class="status" id="status">Ожидание загрузки VK Bridge...</p>

    <button id="btn" disabled>
        🔑 Получить токен сообщества
    </button>

    <p style="margin-top: 20px; font-size: 12px; color: #999;">
        Проверяй консоль (F12) для диагностики.
    </p>

    <script>
        // Функция для безопасного обновления статуса
        const updateStatus = (text, className = 'status') => {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = className;
        };

        // 1. Проверка наличия объекта сразу после загрузки DOM (благодаря defer)
        if (typeof VKBridge === 'undefined') {
            console.error('❌ КРИТИЧЕСКАЯ ОШИБКА: Объект VKBridge не создан.');
            console.error('Причина 1: Скрипт не загрузился (блокировщик рекламы / CDN недоступен).');
            console.error('Причина 2: Ошибка в пути к файлу script src.');
            updateStatus('Ошибка: VK Bridge не найден. Проверьте консоль (F12).', 'error-msg');
        } else {
            console.log('✅ VK Bridge успешно загружен в память браузера.');
            updateStatus('VK Bridge загружен. Инициализация...');

            // 2. Подписка на событие инициализации
            VKBridge.subscribe('VKWebAppInitResult', () => {
                console.log('✅ VK Bridge успешно инициализирован!');
                updateStatus('Статус: Инициализировано. Готово к работе.', 'success-msg');
                
                const btn = document.getElementById('btn');
                btn.disabled = false;
                btn.textContent = '✅ Готово! Нажми для получения токена';

                // 3. Обработчик кнопки
                btn.addEventListener('click', () => {
                    console.log('🖱️ Запрос токена сообщества...');
                    VKBridge.send('VKWebAppGetCommunityToken', {
                        group_id: 239900520,
                        scope: 'polls,wall,offline'
                    });
                });
            });

            // 4. Запуск инициализации
            console.log('📡 Отправляем команду VKWebAppInit...');
            VKBridge.send('VKWebAppInit');
        }

        // 5. Обработка результата токена
        VKBridge.on('VKWebAppGetCommunityTokenResult', (e) => {
            const token = e.detail.access_token;
            console.log('🔑 ТОКЕН ПОЛУЧЕН:', token);
            alert('Токен скопирован в консоль (F12):\n\n' + token);
        });

        // 6. Обработка ошибок
        VKBridge.on('VKWebAppError', (e) => {
            console.error('❌ Ошибка VK Bridge:', e.detail);
            updateStatus('Ошибка приложения: ' + (e.detail?.error_description || 'Неизвестная ошибка'), 'error-msg');
            alert('Произошла ошибка. Подробности в консоли (F12).');
        });
    </script>
</body>
</html>
