<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Mini App: Токен для опросов</title>
    
    <!-- ВАЖНО: Подключаем локальную копию библиотеки. 
         Файл vk-bridge.min.js должен лежать в той же папке, что и index.html. -->
    <script src="vk-bridge.min.js" defer></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #0077FF; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #0077FF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        button:not(:disabled):hover { opacity: 0.8; }
        .status { margin-top: 10px; font-size: 14px; color: #666; }
        .success-msg { color: #2e7d32; font-weight: bold; }
        .error-msg { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Получение токена для опросов</h1>
    <p>Приложение инициализируется...</p>
    <p class="status" id="status">Ожидание загрузки VK Bridge...</p>

    <button id="btn" disabled>
        🔑 Получить токен сообщества
    </button>

    <p style="margin-top: 20px; font-size: 12px; color: #999;">
        Проверяй консоль (F12) для диагностики.
    </p>

    <script>
        const updateStatus = (text, className = 'status') => {
            const el = document.getElementById('status');
            if (el) {
                el.textContent = text;
                el.className = className;
            }
        };

        // Ждем загрузки DOM благодаря атрибуту defer в теге script выше
        if (typeof VKBridge === 'undefined') {
            console.error('❌ КРИТИЧЕСКАЯ ОШИБКА: VKBridge не определен!');
            console.error('Причина: Файл vk-bridge.min.js не найден или не загружен.');
            console.log('🔍 Инструкция:');
            console.log('1. Убедись, что файл vk-bridge.min.js загружен в репозиторий.');
            console.log('2. Убедись, что он лежит в той же папке, что и index.html.');
            console.log('3. Проверь вкладку Network (Сеть) в консоли — ищи красный файл vk-bridge.min.js');
            
            updateStatus('Ошибка: VK Bridge не загружен. См. консоль (F12).', 'error-msg');
        } else {
            console.log('✅ VK Bridge успешно загружен из локальной копии!');
            updateStatus('VK Bridge загружен. Инициализация...', 'success-msg');

            // Подписка на событие инициализации
            VKBridge.subscribe('VKWebAppInitResult', () => {
                console.log('✅ VK Bridge успешно инициализирован!');
                updateStatus('Статус: Готово к работе.', 'success-msg');
                
                const btn = document.getElementById('btn');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '✅ Готово! Нажми для получения токена';
                    
                    btn.addEventListener('click', () => {
                        console.log('🖱️ Запрос токена сообщества...');
                        VKBridge.send('VKWebAppGetCommunityToken', {
                            group_id: 239900520,
                            scope: 'polls,wall,offline'
                        });
                    });
                }
            });

            // Отправка команды инициализации
            VKBridge.send('VKWebAppInit');
        }

        // Обработка результата получения токена
        VKBridge.on('VKWebAppGetCommunityTokenResult', (e) => {
            const token = e.detail.access_token;
            console.log('🔑 ТОКЕН ПОЛУЧЕН:', token);
            alert('Токен скопирован в консоль (F12):\n\n' + token);
        });

        // Обработка ошибок от VK
        VKBridge.on('VKWebAppError', (e) => {
            console.error('❌ Ошибка VK Bridge:', e.detail);
            updateStatus('Ошибка: ' + (e.detail?.error_description || 'Неизвестная ошибка'), 'error-msg');
        });
    </script>
</body>
</html>
